name: Build Geode Mod
on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android
          os: ubuntu-latest
          target: Android
        - name: Windows
          os: windows-latest
          target: Windows

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          target: ${{ matrix.config.target }}
          # Эта строка заставляет GitHub сохранять результат
          combine: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod-${{ matrix.config.name }}
          path: build/*.geode
          
